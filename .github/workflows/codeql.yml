# CodeQL analysis for Anamorph (C++17 / JUCE audio plugin).
#
# Languages analyzed:
#   * c-cpp   -- src/ + tests/ (the only application code in the repo)
#   * actions -- .github/workflows/ (workflow security queries)
#
# c-cpp uses build-mode MANUAL, not "none": JUCE 8.0.14 arrives via CMake
# FetchContent at configure time, so the bare checkout contains no framework
# headers and a no-build analysis could resolve almost none of the includes.
# The manual build mirrors the proven Linux CI steps from build.yml
# (scripts/setup-linux.sh + Ninja Release) but compiles only the VST3 and
# test targets: the Standalone format recompiles the identical translation
# units and would double extraction time for zero extra alert coverage
# (ANAMORPH_BUILD_STANDALONE is an existing CMake option, default ON).
#
# Alerts are limited to the repository's own code (config paths-ignore:
# build) -- the FetchContent'd JUCE tree lands in build/_deps inside the
# workspace and must not raise alerts we cannot act on; JUCE is pin-locked
# and review-gated per docs/policies/DEPENDENCY_POLICY.md.
#
# Query suite: the default code-scanning suite (precision-tuned). The
# security-extended suite was considered and rejected for its higher
# false-positive rate on a codebase with no untrusted-input surface
# (audio plugin: no network, no file-format parsing beyond JUCE's).
#
# Docs-only changes skip the workflow entirely -- a full compile for a
# markdown edit is pure CI cost.
name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'worklogs/**'
      - 'packaging/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'worklogs/**'
      - 'packaging/**'
  schedule:
    - cron: '44 17 * * 5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Alert filter only (extraction still traces the full build):
          # keeps the FetchContent'd JUCE sources under build/_deps out of
          # the results. Harmless for the actions matrix entry -- nothing
          # under .github/ lives in build/.
          config: |
            paths-ignore:
              - build

      # c-cpp only. Same dependency set and configure flags as the Linux job
      # in build.yml; ANAMORPH_BUILD_NUMBER is irrelevant to analysis.
      - name: Build for analysis (c-cpp manual build mode)
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          chmod +x scripts/*.sh
          ./scripts/setup-linux.sh
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DANAMORPH_BUILD_STANDALONE=OFF
          cmake --build build --target Anamorph_VST3 AnamorphTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
