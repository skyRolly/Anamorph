name: Build & Validate

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    # Paused by request: prioritise the macOS build/validation. The source stays
    # cross-platform (Win/Linux); flip this back to true to re-enable Linux CI.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          chmod +x scripts/*.sh
          ./scripts/setup-linux.sh

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DANAMORPH_BUILD_NUMBER=${{ github.run_number }}

      - name: Build
        run: cmake --build build --config Release

      - name: DSP self-tests
        run: ./scripts/run-tests.sh

      - name: pluginval (strictness 8)
        run: ./scripts/run-pluginval.sh 8

      - name: Upload VST3 (Linux)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Anamorph-VST3-Linux
          path: build/Anamorph_artefacts/Release/VST3/Anamorph.vst3
          if-no-files-found: warn

  macos:
    runs-on: macos-14   # Apple Silicon runner; we build a universal binary
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install ninja || true

      - name: Configure (universal arm64 + x86_64)
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13
          -DANAMORPH_BUILD_NUMBER=${{ github.run_number }}

      - name: Build
        run: cmake --build build --config Release

      - name: DSP self-tests
        run: |
          chmod +x scripts/*.sh
          ./scripts/run-tests.sh

      - name: pluginval (informational, strictness 5)
        continue-on-error: true   # editor/window tests can be flaky on headless CI
        run: |
          curl -L https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip -o pluginval.zip
          unzip -o pluginval.zip >/dev/null
          ./pluginval.app/Contents/MacOS/pluginval --strictness-level 5 --validate \
            build/Anamorph_artefacts/Release/VST3/Anamorph.vst3

      - name: Package macOS plugins (VST3 + AU)
        run: |
          set -e
          DIST="dist/Anamorph-macOS"
          mkdir -p "$DIST"
          VST3="build/Anamorph_artefacts/Release/VST3/Anamorph.vst3"
          AU="build/Anamorph_artefacts/Release/AU/Anamorph.component"
          # Ad-hoc codesign so macOS will load the bundles after quarantine removal.
          codesign --force --deep --sign - "$VST3" || true
          codesign --force --deep --sign - "$AU" || true
          cp -R "$VST3" "$DIST/"
          cp -R "$AU"   "$DIST/"
          cp packaging/macos/INSTALL.txt "$DIST/INSTALL.txt"
          # Verify both slices are present in the universal binary.
          echo "== VST3 arches =="; lipo -archs "$DIST/Anamorph.vst3/Contents/MacOS/Anamorph" || true
          echo "== AU arches ==";   lipo -archs "$DIST/Anamorph.component/Contents/MacOS/Anamorph" || true

      - name: Upload macOS plugins (VST3 + AU)
        uses: actions/upload-artifact@v4
        with:
          name: Anamorph-macOS
          path: dist/Anamorph-macOS
          if-no-files-found: error
