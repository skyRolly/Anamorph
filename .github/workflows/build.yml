name: Build & Validate (Linux VST3)

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          chmod +x scripts/*.sh
          ./scripts/setup-linux.sh

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: DSP self-tests
        run: ./scripts/run-tests.sh

      - name: pluginval (strictness 8)
        run: ./scripts/run-pluginval.sh 8

      - name: Upload VST3
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Anamorph-VST3-Linux
          path: build/Anamorph_artefacts/Release/VST3/Anamorph.vst3
          if-no-files-found: warn
