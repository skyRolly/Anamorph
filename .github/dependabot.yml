# Dependabot configuration for Anamorph.
#
# github-actions is the ONLY Dependabot-supported ecosystem in this repo.
# The C++ dependency (JUCE 8.0.14) is fetched by CMake FetchContent pinned
# to an exact tag; CMake is not a Dependabot ecosystem, and a JUCE bump is
# deliberately a manual, review-gated Build System change (an unpinned bump
# can silently move DSP behaviour/latency/state ABI) -- see
# docs/policies/DEPENDENCY_POLICY.md and ARCHITECTURE_REVIEW_GATE.md.
#
# Action bumps are grouped into a single weekly PR to keep update noise at
# one CI run per week instead of one per action.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
